<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phishing Reporter</title>
  <link rel="stylesheet" href="taskpane.css" />
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
  <main class="shell" aria-labelledby="titleText">
    <header class="hero">
      <p id="envBadge" class="env-badge" hidden>prod</p>
      <h1 id="titleText">Phishing Reporter</h1>
      <p id="subtitleText">Analyzing the selected message and preparing a secure report.</p>
    </header>

    <section class="panel" aria-live="polite">
      <p id="statusText" class="status status-pending">Initializing Outlook add-in...</p>
      <button id="reportButton" class="action-button" type="button">Report this message</button>
      <p id="resultText" class="result"></p>
    </section>

    <section class="timeline" aria-label="Execution progress">
      <p class="timeline-title">Workflow</p>
      <ol class="timeline-list">
        <li id="step-1">1. Read runtime configuration</li>
        <li id="step-2">2. Inspect message headers</li>
        <li id="step-3">3. Submit report to security</li>
        <li id="step-4">4. Move message to Deleted Items</li>
      </ol>
    </section>
  </main>

  <script src="taskpane.js"></script>
</body>
</html>
