<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Phishing Reporter</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="taskpane.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 15px;
            color: #333;
        }
        .header { font-weight: bold; font-size: 16px; margin-bottom: 10px; }
        .description { font-size: 13px; margin-bottom: 20px; color: #666; }
        .btn-report {
            background-color: #d9534f;
            color: white;
            border: none;
            padding: 10px 15px;
            width: 100%;
            cursor: pointer;
            font-size: 14px;
            border-radius: 4px;
        }
        .btn-report:disabled { background-color: #ccc; cursor: not-allowed; }
        .status { margin-top: 15px; font-size: 13px; font-weight: bold; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
    </style>
</head>
<body>
    <div class="header">Report Suspicious Email</div>
    <div class="description">Clicking the button below will securely package this email and route it to the Security Operations Center for analysis.</div>
    <button id="reportButton" class="btn-report">Report to SOC</button>
    <div id="statusText" class="status"></div>
</body>
</html>
